# ============================================================================
# RT-DETR Training Configuration
# ============================================================================
#
# This file contains every configurable parameter used during model training.
# train.py should NEVER hardcode these values.
#
# Changing this file changes the training behavior without touching code.
# ============================================================================

# ---------------------------------------------------------------------------
# Model
# ---------------------------------------------------------------------------

# Hugging Face model checkpoint to fine-tune.
model_checkpoint: "PekingU/rtdetr_v2_r50vd"

# ---------------------------------------------------------------------------
# Dataset
# ---------------------------------------------------------------------------

# COCO-format annotation file for training images.
train_manifest: "data/splits/train.json"

# COCO-format annotation file for validation images.
val_manifest: "data/splits/val.json"

# ---------------------------------------------------------------------------
# Image
# ---------------------------------------------------------------------------

# Input image size.
# Images are resized to 640×640 before entering the model.
image_size: 640

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------

# Number of images processed in one forward/backward pass.
batch_size: 8

# Number of complete passes through the dataset.
num_epochs: 10

# Optimizer learning rate.
learning_rate: 0.0001

# Random seed for reproducibility.
seed: 42

# ---------------------------------------------------------------------------
# Checkpoints
# ---------------------------------------------------------------------------

# Directory where checkpoints will be saved.
output_dir: "models/checkpoints"

# ---------------------------------------------------------------------------
# Data Loading
# ---------------------------------------------------------------------------

# Number of CPU workers used by DataLoader.
num_workers: 2

# Keep workers alive between epochs.
persistent_workers: true

# Faster GPU transfer.
pin_memory: true


weight_decay: 0.0001
max_grad_norm: 0.1

scheduler: "cosine"
warmup_steps: 500


# Faster training on GPU.
fp16: true

# ---------------------------------------------------------------------------
# Validation
# ---------------------------------------------------------------------------

# Validate every N epochs.
eval_every: 1

# Save checkpoint every N epochs.
save_every: 1

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

log_every: 10

# ---------------------------------------------------------------------------
# Resume Training
# ---------------------------------------------------------------------------

resume_from_checkpoint: null