# ============================================================================
# RT-DETR Inference Configuration
# ============================================================================
#
# This file contains every runtime setting used during inference.
# It is loaded ONCE when the FastAPI application starts.
#
# Changing this file changes inference behavior WITHOUT changing code.
# ============================================================================

# ---------------------------------------------------------------------------
# Model
# ---------------------------------------------------------------------------

# Path to the trained model checkpoint.
# Update this after selecting your best model.
model_path: "models/checkpoints/best_model"

# ---------------------------------------------------------------------------
# Image
# ---------------------------------------------------------------------------

# Image size used during inference.
# MUST match the image_size used during training.
image_size: 640

# ---------------------------------------------------------------------------
# Detection
# ---------------------------------------------------------------------------

# Minimum confidence score required for a prediction.
confidence_threshold: 0.50

# Maximum number of detections returned per image.
max_detections: 300

# Non-Maximum Suppression (NMS) threshold.
# Used to remove duplicate overlapping boxes.
nms_threshold: 0.50

# ---------------------------------------------------------------------------
# Inventory
# ---------------------------------------------------------------------------

# Product considered low stock below this percentage.
low_stock_threshold: 0.60

# ---------------------------------------------------------------------------
# Device
# ---------------------------------------------------------------------------

# auto | cuda | cpu
device: "auto"

# ---------------------------------------------------------------------------
# Visualization
# ---------------------------------------------------------------------------

# Draw bounding boxes.
draw_boxes: true

# Draw class labels.
draw_labels: true

# Draw confidence scores.
draw_scores: true

# Bounding box thickness.
box_thickness: 2

# Text size.
font_scale: 0.6

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------

# Save annotated image.
save_prediction_image: true

# Save prediction JSON.
save_prediction_json: true

# Output directory.
output_dir: "outputs/predictions"

# ---------------------------------------------------------------------------
# Performance
# ---------------------------------------------------------------------------

# Use FP16 during inference if GPU supports it.
fp16: true

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

verbose: true